#定义请求参数
[request_definition]
r = sub, obj, act

[policy_definition]
p = sub, obj, act

[policy_effect]
e = some(where (p.eft == allow))

[matchers]
m = r.sub == p.sub && keyMatch(r.obj, p.obj) && regexMatch(r.act, p.act) || r.sub == "admin"

# admin level 1 all permission allowed
# common level 2  some add/delete permission and read permission allowd
# customer level 3  only read permission allowed